pluginManagement { includeBuild("../node_modules/@react-native/gradle-plugin") }
plugins { id("com.facebook.react.settings") }
def reactAutolinkLockFiles = files(
    "../yarn.lock",
    "../package-lock.json",
    "../package.json",
    "../react-native.config.js",
    "app/build.gradle",
    "app/src/main/AndroidManifest.xml",
)

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    def npxCommand = System.getProperty('os.name').toLowerCase().contains('windows') ? "npx.cmd" : "npx"
    ex.autolinkLibrariesFromCommand(
        [npxCommand, "@react-native-community/cli", "config"],
        file("../"),
        reactAutolinkLockFiles,
    )
}
rootProject.name = 'iLifeLearn'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')
